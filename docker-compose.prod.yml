services:
  mongodb:
    image: mongo:6
    container_name: devcollab-mongodb-prod
    restart: always
    volumes:
      - mongo_data:/data/db
      - ./backups:/backups
    networks:
      - devcollab-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/${DOCKER_IMAGE_OWNER}/devcollab-backend:latest
    container_name: devcollab-backend-prod
    restart: always
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/devcollab
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - FRONTEND_URL=${FRONTEND_URL}
      - BREVO_API_KEY=${BREVO_API_KEY}
    depends_on:
      - mongodb
    networks:
      - devcollab-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/${DOCKER_IMAGE_OWNER}/devcollab-frontend:latest
    container_name: devcollab-frontend-prod
    restart: always
    depends_on:
      - backend
    networks:
      - devcollab-network
    ports:
      # Changed to 8080:8080 to match frontend's non-root configuration
      # and avoid conflicting with host port 80 used by the main Nginx container
      - "8080:8080"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: devcollab-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - devcollab-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  devcollab-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
